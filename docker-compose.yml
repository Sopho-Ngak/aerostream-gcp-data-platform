# Shared defaults anchor reused by all services to keep ops behavior consistent.
x-defaults: &defaults
  restart: unless-stopped
  init: true
  networks:
    - data-platform
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

x-hadoop-env: &hadoop-env
  CORE_CONF_fs_defaultFS: hdfs://namenode:9000
  HDFS_CONF_dfs_namenode_rpc___address: namenode:9000
  HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check: "false"

# Airflow 3 specific common environment
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/Dockerfile.airflow
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__AUTH_MANAGER: "airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'true'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__FERNET_KEY: 'd6Vefz3G9U_5XB3kslRI0M6lCJj0jJOkZkzYJpFqE6s='
    AIRFLOW__WEBSERVER__SECRET_KEY: 'supersecretkey12345678901234567890'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW__API__SECRET_KEY: 'supersecretkey12345678901234567890'
    AIRFLOW__WEBSERVER__RBAC: 'true'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW__WEBSERVER__BASE_URL: 'http://localhost:8082'
    AIRFLOW__CELERY__BROKER_URL: 'redis://redis:6379/0'
    AIRFLOW__CELERY__RESULT_BACKEND: 'db+postgresql://airflow:airflow@airflow-postgres/airflow'
    # Add GCP and other env vars
    GCP_PROJECT_ID: ${GCP_PROJECT_ID}
    GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
    BIGQUERY_DATASET: ${BIGQUERY_DATASET}
    PYTHONPATH: /opt/airflow/src
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./scripts:/opt/airflow/scripts
    - ./logs/airflow:/opt/airflow/logs
    - ./config/airflow:/opt/airflow/config
    - ./data:/opt/airflow/data
    - ./spark-apps:/opt/airflow/spark-apps
    - /var/run/docker.sock:/var/run/docker.sock
  depends_on:
    airflow-postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  user: "${AIRFLOW_UID:-50000}:0"
  env_file:
    - .env

services:
  # ==================== KAFKA STACK ====================
  zookeeper:
    <<: *defaults
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-ec", "exec 3<>/dev/tcp/127.0.0.1/2181"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    mem_limit: 512m
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log

  kafka:
    <<: *defaults
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_BYTES: 10737418240
    healthcheck:
      test: ["CMD", "bash", "-ec", "exec 3<>/dev/tcp/127.0.0.1/9092"]
      interval: 30s
      timeout: 10s
      retries: 12
      start_period: 90s
    mem_limit: 1g
    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-ui:
    <<: *defaults
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8083:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    mem_limit: 256m

  # ==================== HADOOP STACK ====================
  namenode:
    <<: *defaults
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    environment:
      <<: *hadoop-env
      CLUSTER_NAME: aerostream
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - namenode:/hadoop/dfs/name
    healthcheck:
      test: ["CMD", "bash", "-ec", "exec 3<>/dev/tcp/127.0.0.1/9870 && exec 4<>/dev/tcp/127.0.0.1/9000"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    mem_limit: 1g

  datanode:
    <<: *defaults
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    depends_on:
      - namenode
    environment:
      <<: *hadoop-env
      SERVICE_PRECONDITION: namenode:9870 namenode:9000
    volumes:
      - datanode:/hadoop/dfs/data
    mem_limit: 2g

  # ==================== SPARK STACK ====================
  spark-master:
    <<: *defaults
    image: apache/spark:4.0.2-scala2.13-java17-python3-r-ubuntu
    container_name: spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "--host", "spark-master", "--port", "7077", "--webui-port", "8080"]
    ports:
      - "8080:8080"
      - "7077:7077"
    healthcheck:
      test: ["CMD", "bash", "-ec", "exec 3<>/dev/tcp/127.0.0.1/7077"]
      interval: 30s
      timeout: 10s
      retries: 12
      start_period: 90s
    mem_limit: 2g
    environment:
      - HADOOP_CONF_DIR=/opt/hadoop/etc/hadoop
      - SPARK_IVY_HOME=/tmp/.ivy2
      - SPARK_HOME=/opt/spark
    volumes:
      - ./src:/opt/spark/work-dir/src
      - ./spark-apps:/opt/spark-apps
      - ./data:/opt/spark-data
      - ./ivy:/tmp/.ivy2
      - ./config/spark:/opt/spark/conf

  spark-worker:
    <<: *defaults
    image: apache/spark:4.0.2-scala2.13-java17-python3-r-ubuntu
    container_name: spark-worker
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077", "--webui-port", "8081", "--cores", "2", "--memory", "2g"]
    mem_limit: 3g
    environment:
      - HADOOP_CONF_DIR=/opt/hadoop/etc/hadoop
      - SPARK_IVY_HOME=/tmp/.ivy2
      - SPARK_HOME=/opt/spark
    volumes:
      - ./src:/opt/spark/work-dir/src
      - ./spark-apps:/opt/spark-apps
      - ./data:/opt/spark-data
    ports:
      - "8081:8081"

  spark-history:
    <<: *defaults
    image: apache/spark:4.0.2-scala2.13-java17-python3-r-ubuntu
    container_name: spark-history
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.history.HistoryServer"]
    ports:
      - "18080:18080"
    environment:
      - SPARK_HISTORY_OPTS=-Dspark.history.fs.logDirectory=hdfs://namenode:9000/spark-logs
    volumes:
      - ./config/spark:/opt/spark/conf
    mem_limit: 1g

  # ==================== REDIS (for Airflow Celery) ====================
  redis:
    <<: *defaults
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 256m

  # ==================== INGESTION SERVICE ====================
  ingestion:
    <<: *defaults
    build:
      context: .
      dockerfile: docker/Dockerfile.ingestion
    container_name: ingestion
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs

  # ==================== AIRFLOW 3 STACK ====================
  airflow-postgres:
    <<: *defaults
    image: postgres:15
    container_name: airflow-postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    ports:
      - "5432:5432"
    volumes:
      - airflow-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    # mem_limit: 512m

  airflow-init:
    <<: [*defaults, *airflow-common]
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "Waiting for PostgreSQL..."
        sleep 5
        
        echo "Running database migrations..."
        airflow db migrate

        echo "Creating admin user..."
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin || true
        airflow connections add 'spark_default' \
          --conn-type 'spark' \
          --conn-host 'spark://spark-master' \
          --conn-port '7077' || true
        airflow connections add 'hdfs_default' \
          --conn-type 'hdfs' \
          --conn-host 'hdfs://namenode' \
          --conn-port '9000' || true
        echo "Airflow 3 initialization complete!"
    # mem_limit: 512m

  airflow-scheduler:
    <<: [*defaults, *airflow-common]
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "scheduler", "--help"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 1g

  airflow-api-server:
    <<: [*defaults, *airflow-common]
    container_name: airflow-api-server
    command: api-server
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    # mem_limit: 1g

  # airflow-worker:
  #   <<: [*defaults, *airflow-common]
  #   container_name: airflow-worker
  #   command: celery worker
  #   mem_limit: 1g

  # airflow-triggerer:
  #   <<: [*defaults, *airflow-common]
  #   container_name: airflow-triggerer
  #   command: triggerer
  #   mem_limit: 512m

  # ==================== SUPERSET ====================
  superset-db:
    <<: *defaults
    image: postgres:15
    container_name: superset-db
    environment:
      - POSTGRES_USER=superset
      - POSTGRES_PASSWORD=superset
      - POSTGRES_DB=superset
    volumes:
      - superset-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "superset"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-platform
    mem_limit: 512m

  superset:
    build:
      context: .
      dockerfile: docker/Dockerfile.superset
    container_name: superset
    environment:
      - SUPERSET__SQLALCHEMY_DATABASE_URI=postgresql://superset:superset@superset-db:5432/superset
      - SUPERSET_SECRET_KEY=your_secret_key_here_change_me_123456789
      # - PYTHONPATH=/app/pythonpath
    volumes:
      - ./config/superset/superset_config.py:/app/pythonpath/superset_config.py
      - ./data/superset:/app/superset_home
      - ./dashboard:/app/dashboard
    command:
      - -c
      - |
        echo 'Initializing Superset database...' &&
        pip install psycopg2-binary &&
        superset db upgrade &&
        superset init &&
        echo 'Creating admin user...' &&
        superset fab create-admin --username admin --firstname Admin --lastname User --email admin@example.com --password admin &&
        gunicorn -b 0.0.0.0:8088 -w 2 --timeout 300 'superset.app:create_app()'
    ports:
      - "8088:8088"
    depends_on:
      superset-db:
        condition: service_healthy
    entrypoint: /bin/bash
    # entrypoint: ["/bin/bash", "/superset_init.sh"]
    networks:
      - data-platform
    mem_limit: 1g

  # ==================== MONITORING ====================
  prometheus:
    <<: *defaults
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    mem_limit: 512m

  grafana:
    <<: *defaults
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    mem_limit: 512m

  # ==================== HEALTH CHECK ====================
  health-check:
    <<: *defaults
    image: alpine:latest
    container_name: health-check
    depends_on:
      zookeeper:
        condition: service_healthy
      kafka:
        condition: service_healthy
      namenode:
        condition: service_healthy
      # spark-master:
      #   condition: service_healthy
      airflow-postgres:
        condition: service_healthy
      airflow-api-server:
        condition: service_healthy
    command: >
      sh -c "
        echo '🔍 Running health checks...' &&
        echo '✅ All services are healthy!'
      "

# ==================== VOLUMES ====================
volumes:
  # Kafka volumes
  zookeeper-data:
    driver: local
  zookeeper-log:
    driver: local
  kafka-data:
    driver: local
  
  # Hadoop volumes
  namenode:
    driver: local
  datanode:
    driver: local
  
  # Airflow volumes
  airflow-postgres:
    driver: local
  
  # Superset volumes
  superset-db:
    driver: local
  
  # Monitoring volumes
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

  superset-db-data:
    driver: local

# ==================== NETWORKS ====================
networks:
  data-platform:
    driver: bridge